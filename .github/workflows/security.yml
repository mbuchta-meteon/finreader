name: Security audit

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 8am — weekly check

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm audit --audit-level=high
        # Fails the build if any HIGH or CRITICAL vulnerability found
