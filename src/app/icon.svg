<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#6366f1"/>
  <!-- Card body -->
  <rect x="5" y="10" width="22" height="14" rx="2.5" fill="white" opacity="0.95"/>
  <!-- Magnetic stripe / top bar -->
  <rect x="5" y="13.5" width="22" height="3.5" fill="#4338ca"/>
  <!-- Chip -->
  <rect x="8" y="17.5" width="5" height="4" rx="1" fill="#fbbf24"/>
  <line x1="10.5" y1="17.5" x2="10.5" y2="21.5" stroke="#d97706" stroke-width="0.6"/>
  <line x1="8" y1="19.5" x2="13" y2="19.5" stroke="#d97706" stroke-width="0.6"/>
  <!-- Signal dots -->
  <circle cx="21" cy="19.5" r="1.5" fill="#6366f1" opacity="0.5"/>
  <circle cx="24" cy="19.5" r="1.5" fill="#6366f1" opacity="0.85"/>
</svg>
